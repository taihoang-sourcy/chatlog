<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatlog API Playground</title>
    <style>
      :root {
        --primary: #0f766e;
        --primary-hover: #0d9488;
        --accent: #14b8a6;
        --bg-dark: #0d1117;
        --bg-card: #161b22;
        --bg-input: #21262d;
        --border: #30363d;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --success: #3fb950;
        --error: #f85149;
      }

      * { box-sizing: border-box; }
      body {
        font-family: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
        background: var(--bg-dark);
        color: var(--text);
        margin: 0;
        padding: 20px;
        line-height: 1.5;
      }

      .layout { max-width: 1100px; margin: 0 auto; }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .header h1 { margin: 0; font-size: 1.5rem; }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--bg-card);
        border-radius: 6px;
        font-size: 13px;
      }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; }
      .status-dot.ok { background: var(--success); }
      .status-dot.err { background: var(--error); }

      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 16px;
      }
      .tab {
        padding: 8px 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      .tab:hover { background: var(--bg-input); }
      .tab.active {
        background: var(--primary);
        border-color: var(--primary);
      }

      .panel {
        display: none;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 16px;
      }
      .panel.active { display: block; }

      .form-row {
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .form-group {
        flex: 1;
        min-width: 200px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 4px;
      }
      .form-group input, .form-group select {
        width: 100%;
        padding: 8px 12px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: inherit;
        font-size: 13px;
      }

      .presets {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .preset-btn {
        padding: 6px 12px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 12px;
      }
      .preset-btn:hover { color: var(--accent); border-color: var(--accent); }

      .session-picker {
        max-height: 120px;
        overflow-y: auto;
        background: var(--bg-input);
        border-radius: 6px;
        padding: 8px;
      }
      .session-item {
        padding: 6px 10px;
        cursor: pointer;
        font-size: 12px;
        border-radius: 4px;
      }
      .session-item:hover { background: var(--bg-card); }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 10px 18px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-family: inherit;
        font-weight: 500;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
      }
      .btn-primary:hover { background: var(--primary-hover); }
      .btn-secondary {
        background: var(--bg-input);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

      .result-section {
        margin-top: 20px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }
      .result-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: var(--bg-input);
        border-bottom: 1px solid var(--border);
      }
      .result-toolbar .url {
        font-size: 12px;
        color: var(--text-muted);
        word-break: break-all;
        flex: 1;
        margin-right: 12px;
      }
      .result-buttons { display: flex; gap: 8px; }
      .result-body {
        padding: 16px;
        max-height: 420px;
        overflow: auto;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .result-body.json { color: #79c0ff; }
      .error-box {
        padding: 12px;
        background: rgba(248, 81, 73, 0.1);
        border-left: 4px solid var(--error);
        border-radius: 0 6px 6px 0;
        margin-top: 12px;
      }
      .loading::after {
        content: "...";
        animation: dots 1.2s steps(4, end) infinite;
      }
      @keyframes dots {
        0%, 25% { content: "."; }
        50% { content: ".."; }
        75%, 100% { content: "..."; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="header">
        <h1>🔧 Chatlog API Playground</h1>
        <div class="status" id="status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Checking...</span>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="chatlog">Chatlog</div>
        <div class="tab" data-tab="session">Session</div>
        <div class="tab" data-tab="contact">Contact</div>
        <div class="tab" data-tab="chatroom">Chatroom</div>
      </div>

      <!-- Chatlog Panel -->
      <div class="panel active" id="chatlog-panel">
        <div class="form-row">
          <div class="form-group">
            <label>Time range *</label>
            <input type="text" id="time" placeholder="last-7d, 2023-01-01~2023-01-31, all" />
            <div class="presets" style="margin-top: 6px;">
              <button class="preset-btn" data-time="last-7d">last-7d</button>
              <button class="preset-btn" data-time="last-30d">last-30d</button>
              <button class="preset-btn" data-time="today">today</button>
              <button class="preset-btn" data-time="yesterday">yesterday</button>
              <button class="preset-btn" data-time="all">all</button>
            </div>
          </div>
          <div class="form-group">
            <label>Talker (wxid, group ID, nickname) *</label>
            <input type="text" id="talker" placeholder="wxid_xxx or 123@chatroom" />
            <button class="btn btn-secondary" id="load-sessions-btn" style="margin-top: 6px;">Load sessions →</button>
            <div class="session-picker" id="session-picker" style="display:none; margin-top: 8px;"></div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Sender (optional)</label>
            <input type="text" id="sender" placeholder="Filter by sender" />
          </div>
          <div class="form-group">
            <label>Keyword regex (optional)</label>
            <input type="text" id="keyword" placeholder="Search in content" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group" style="flex: 0 0 120px;">
            <label>Limit</label>
            <input type="number" id="limit" placeholder="0 = all" min="0" />
          </div>
          <div class="form-group" style="flex: 0 0 120px;">
            <label>Offset</label>
            <input type="number" id="offset" placeholder="0" min="0" />
          </div>
          <div class="form-group" style="flex: 0 0 140px;">
            <label>Format</label>
            <select id="format">
              <option value="">text</option>
              <option value="json">json</option>
              <option value="csv">csv</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="run-chatlog">Run</button>
        </div>
      </div>

      <!-- Session Panel -->
      <div class="panel" id="session-panel">
        <div class="form-row">
          <div class="form-group">
            <label>Keyword (optional)</label>
            <input type="text" id="session-keyword" placeholder="Filter sessions" />
          </div>
          <div class="form-group" style="flex: 0 0 140px;">
            <label>Format</label>
            <select id="session-format">
              <option value="">default</option>
              <option value="json">json</option>
              <option value="csv">csv</option>
              <option value="text">text</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="run-session">Run</button>
        </div>
      </div>

      <!-- Contact Panel -->
      <div class="panel" id="contact-panel">
        <div class="form-row">
          <div class="form-group">
            <label>Keyword (optional)</label>
            <input type="text" id="contact-keyword" placeholder="Search contacts" />
          </div>
          <div class="form-group" style="flex: 0 0 140px;">
            <label>Format</label>
            <select id="contact-format">
              <option value="">default</option>
              <option value="json">json</option>
              <option value="csv">csv</option>
              <option value="text">text</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="run-contact">Run</button>
        </div>
      </div>

      <!-- Chatroom Panel -->
      <div class="panel" id="chatroom-panel">
        <div class="form-row">
          <div class="form-group">
            <label>Keyword (optional)</label>
            <input type="text" id="chatroom-keyword" placeholder="Search chat rooms" />
          </div>
          <div class="form-group" style="flex: 0 0 140px;">
            <label>Format</label>
            <select id="chatroom-format">
              <option value="">default</option>
              <option value="json">json</option>
              <option value="csv">csv</option>
              <option value="text">text</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="run-chatroom">Run</button>
        </div>
      </div>

      <!-- Result -->
      <div class="result-section" id="result-section" style="display: none;">
        <div class="result-toolbar">
          <span class="url" id="result-url"></span>
          <div class="result-buttons">
            <button class="btn btn-secondary" id="copy-curl">Copy cURL</button>
            <button class="btn btn-secondary" id="copy-result">Copy result</button>
          </div>
        </div>
        <div class="result-body" id="result-body"></div>
      </div>
      <div class="error-box" id="error-box" style="display: none;"></div>
    </div>

    <script>
      const base = window.location.origin;

      async function checkHealth() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        try {
          const r = await fetch('/health');
          const ok = r.ok;
          dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
          text.textContent = ok ? 'API ready' : 'API error';
        } catch (e) {
          dot.className = 'status-dot err';
          text.textContent = 'Offline';
        }
      }
      checkHealth();
      setInterval(checkHealth, 15000);

      document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          document.getElementById(t.dataset.tab + '-panel').classList.add('active');
        });
      });

      document.querySelectorAll('.preset-btn').forEach(b => {
        b.addEventListener('click', () => {
          document.getElementById('time').value = b.dataset.time;
        });
      });

      let lastRequestUrl = '';
      let lastCurlCmd = '';

      function showResult(url, body, isJson) {
        lastRequestUrl = url;
        const fullUrl = base + url;
        lastCurlCmd = `curl "${fullUrl}"`;
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('result-url').textContent = fullUrl;
        const rb = document.getElementById('result-body');
        rb.className = 'result-body' + (isJson ? ' json' : '');
        rb.textContent = typeof body === 'string' ? body : JSON.stringify(body, null, 2);
        document.getElementById('error-box').style.display = 'none';
      }

      function showError(msg) {
        document.getElementById('error-box').textContent = msg;
        document.getElementById('error-box').style.display = 'block';
      }

      document.getElementById('run-chatlog').addEventListener('click', async () => {
        const time = document.getElementById('time').value.trim();
        const talker = document.getElementById('talker').value.trim();
        if (!time || !talker) {
          showError('Time range and Talker are required');
          return;
        }
        const params = new URLSearchParams({ time, talker });
        ['sender', 'keyword', 'limit', 'offset', 'format'].forEach(k => {
          const v = document.getElementById(k).value.trim();
          if (v) params.set(k, v);
        });
        const url = '/api/v1/chatlog?' + params.toString();
        const body = document.getElementById('result-body');
        body.textContent = '';
        body.className = 'result-body loading';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('result-url').textContent = base + url;
        try {
          const r = await fetch(url);
          const contentType = r.headers.get('content-type') || '';
          if (contentType.includes('json')) {
            const data = await r.json();
            body.className = 'result-body json';
            body.textContent = JSON.stringify(data, null, 2);
          } else {
            body.className = 'result-body';
            body.textContent = await r.text();
          }
          lastRequestUrl = url;
          lastCurlCmd = `curl "${base + url}"`;
          if (!r.ok) showError(`HTTP ${r.status}`);
          else document.getElementById('error-box').style.display = 'none';
        } catch (e) {
          body.className = 'result-body';
          body.textContent = '';
          showError(e.message);
        }
      });

      document.getElementById('load-sessions-btn').addEventListener('click', async () => {
        const picker = document.getElementById('session-picker');
        picker.innerHTML = 'Loading...';
        picker.style.display = 'block';
        try {
          const r = await fetch('/api/v1/session?format=json');
          const data = await r.json();
          const items = data.items || [];
          picker.innerHTML = items.length ? items.map(s =>
            `<div class="session-item" data-username="${s.userName}">${(s.nickName || s.userName).substring(0, 40)}</div>`
          ).join('') : '<div class="session-item">No sessions</div>';
          picker.querySelectorAll('.session-item[data-username]').forEach(el => {
            el.addEventListener('click', () => {
              document.getElementById('talker').value = el.dataset.username;
              picker.style.display = 'none';
            });
          });
        } catch (e) {
          picker.innerHTML = 'Failed: ' + e.message;
        }
      });

      async function runApi(endpoint, params) {
        const q = new URLSearchParams(params).toString();
        const url = '/api/v1/' + endpoint + (q ? '?' + q : '');
        const body = document.getElementById('result-body');
        body.textContent = '';
        body.className = 'result-body loading';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('result-url').textContent = base + url;
        try {
          const r = await fetch(url);
          const contentType = r.headers.get('content-type') || '';
          if (contentType.includes('json')) {
            const data = await r.json();
            body.className = 'result-body json';
            body.textContent = JSON.stringify(data, null, 2);
          } else {
            body.className = 'result-body';
            body.textContent = await r.text();
          }
          lastRequestUrl = url;
          lastCurlCmd = `curl "${base + url}"`;
          if (!r.ok) showError(`HTTP ${r.status}`);
          else document.getElementById('error-box').style.display = 'none';
        } catch (e) {
          body.className = 'result-body';
          body.textContent = '';
          showError(e.message);
        }
      }

      document.getElementById('run-session').addEventListener('click', () => {
        const params = {};
        const kw = document.getElementById('session-keyword').value.trim();
        const fmt = document.getElementById('session-format').value;
        if (kw) params.keyword = kw;
        if (fmt) params.format = fmt;
        runApi('session', params);
      });

      document.getElementById('run-contact').addEventListener('click', () => {
        const params = {};
        const kw = document.getElementById('contact-keyword').value.trim();
        const fmt = document.getElementById('contact-format').value;
        if (kw) params.keyword = kw;
        if (fmt) params.format = fmt;
        runApi('contact', params);
      });

      document.getElementById('run-chatroom').addEventListener('click', () => {
        const params = {};
        const kw = document.getElementById('chatroom-keyword').value.trim();
        const fmt = document.getElementById('chatroom-format').value;
        if (kw) params.keyword = kw;
        if (fmt) params.format = fmt;
        runApi('chatroom', params);
      });

      document.getElementById('copy-curl').addEventListener('click', () => {
        navigator.clipboard.writeText(lastCurlCmd).then(() => {
          const b = document.getElementById('copy-curl');
          b.textContent = 'Copied!';
          setTimeout(() => b.textContent = 'Copy cURL', 1500);
        });
      });

      document.getElementById('copy-result').addEventListener('click', () => {
        navigator.clipboard.writeText(document.getElementById('result-body').textContent).then(() => {
          const b = document.getElementById('copy-result');
          b.textContent = 'Copied!';
          setTimeout(() => b.textContent = 'Copy result', 1500);
        });
      });
    </script>
  </body>
</html>
